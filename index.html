<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Title shown in browser tab -->
    <title>CashTrack - Expense Tracker</title>

    <!-- Connecting CSS file -->
    <link rel="stylesheet" href="style.css" />

    <!-- Library used to export page as PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
  </head>

  <body>
    <!-- Main title of the app -->
    <h1>CashTrack</h1>

    <!-- ============================= -->
    <!-- MAIN CARD CONTAINER -->
    <!-- ============================= -->

    <div class="container">
      <!-- ============================= -->
      <!-- SALARY INPUT SECTION -->
      <!-- ============================= -->

      <h3>Enter / Edit Salary</h3>

      <div class="salary-box">
        <!-- input field where user enters salary -->
        <input type="number" id="salaryInput" placeholder="Enter your salary" />

        <!-- 
      IMPORTANT:
      type="button" prevents this button from submitting the form
      and refreshing the page
      -->
        <button type="button" id="setSalaryBtn">Set Salary</button>
      </div>

      <!-- ============================= -->
      <!-- BALANCE SECTION -->
      <!-- ============================= -->

      <h2>Your Balance</h2>

      <!-- Balance will be updated using JavaScript -->
      <h3 id="balance">₹0</h3>

      <!-- Income & Expense summary -->
      <div class="summary">
        <div>
          <h4>Income</h4>
          <p id="income">₹0</p>
        </div>

        <div>
          <h4>Expense</h4>
          <p id="expense">₹0</p>
        </div>
      </div>

      <!-- ============================= -->
      <!-- ADD EXPENSE SECTION -->
      <!-- ============================= -->

      <h3>Add Expense</h3>

      <!-- 
    Using a form allows us to capture user input easily
    The JavaScript will stop it from refreshing using preventDefault()
    -->
      <form id="form">
        <!-- description input -->
        <input type="text" id="text" placeholder="Enter description" />

        <!-- expense amount -->
        <input type="number" id="amount" placeholder="Enter expense amount" />

        <!-- 
      type="submit" triggers the form submission
      JavaScript listens to this event
      -->
        <button type="submit">Add Expense</button>
      </form>

      <!-- ============================= -->
      <!-- TRANSACTION HISTORY -->
      <!-- ============================= -->

      <h3>History</h3>

      <!-- transactions will appear here dynamically -->
      <ul id="list"></ul>

      <!-- ============================= -->
      <!-- DOWNLOAD REPORT BUTTON -->
      <!-- ============================= -->

      <!-- this button will export the expense report -->
      <button id="downloadBtn">Download Report</button>
    </div>

    <!-- ============================= -->
    <!-- CONNECTING JAVASCRIPT -->
    <!-- ============================= -->

    <script src="script.js"></script>
  </body>
</html>
